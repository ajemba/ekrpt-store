<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#07080b; --panel:#0d0f14; --panel-2:#11141b; --line:rgba(255,255,255,.08);
  --ink:#f4f6fb; --muted:#8b93a3; --red:#e0202d; --red-deep:#b3151f; --red-glow:rgba(224,32,45,.4);
  --bhead:'Sora',sans-serif; --bbody:'Inter',sans-serif; --bmono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--ink);font-family:var(--bbody)}
.blog-hero{position:relative;overflow:hidden;background:var(--panel);color:var(--ink);padding:80px 24px 64px;text-align:center;border-bottom:1px solid var(--line)}
.blog-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(700px 360px at 50% -10%,rgba(224,32,45,.18),transparent 65%),linear-gradient(180deg,#0d0f14,#07080b);pointer-events:none}
.blog-hero::after{content:"";position:absolute;inset:0;opacity:.4;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:54px 54px;-webkit-mask-image:radial-gradient(circle at 50% 30%,#000,transparent 70%);mask-image:radial-gradient(circle at 50% 30%,#000,transparent 70%)}
.blog-hero-inner{position:relative;z-index:1}
.blog-hero .eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:var(--bmono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--red);margin-bottom:18px}
.blog-hero .eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 10px var(--red)}
.blog-hero h1{font-family:var(--bhead);font-size:clamp(34px,6vw,56px);font-weight:800;letter-spacing:-.02em;margin:0 0 14px;line-height:1.05}
.blog-hero h1 em{font-style:normal;color:var(--red);text-shadow:0 0 30px var(--red-glow)}
.blog-hero p{color:var(--muted);max-width:560px;margin:0 auto;font-size:16px;line-height:1.6}
.blog-wrap{max-width:1140px;margin:0 auto;padding:44px 24px 72px}
.blog-cats{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:34px;justify-content:center}
.cat-pill{padding:8px 18px;border-radius:100px;border:1px solid var(--line);background:var(--panel);cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .18s;font-family:var(--bbody)}
.cat-pill:hover{border-color:var(--red);color:var(--ink)}
.cat-pill.active{background:linear-gradient(135deg,var(--red),var(--red-deep));color:#fff;border-color:transparent;box-shadow:0 6px 18px var(--red-glow)}
.posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:26px}
.post-card{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .2s,box-shadow .2s,border-color .2s;display:flex;flex-direction:column}
.post-card:hover{transform:translateY(-5px);box-shadow:0 18px 44px rgba(0,0,0,.5);border-color:rgba(224,32,45,.4)}
.post-cover{height:190px;background:var(--panel-2) center/cover;position:relative;border-bottom:1px solid var(--line)}
.post-cover::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(7,8,11,.55))}
.post-cover .cat{position:absolute;top:12px;left:12px;z-index:1;background:rgba(224,32,45,.95);color:#fff;padding:4px 12px;border-radius:100px;font-size:10px;font-weight:700;font-family:var(--bmono);letter-spacing:.06em;text-transform:uppercase}
.post-cover .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.25}
.post-cover .ph img{height:42px;width:auto;filter:grayscale(1)}
.post-body{padding:22px;flex:1;display:flex;flex-direction:column}
.post-body h2{font-family:var(--bhead);font-size:19px;font-weight:700;line-height:1.32;margin:0 0 9px;color:var(--ink)}
.post-body p{color:var(--muted);font-size:14px;line-height:1.65;flex:1;margin:0}
.post-meta{display:flex;gap:14px;margin-top:16px;font-size:11px;color:var(--muted);font-family:var(--bmono);opacity:.8}
.featured-post{grid-column:1/-1;display:grid;grid-template-columns:1.1fr 1fr;gap:0;background:var(--panel);border:1px solid var(--line);border-radius:20px;overflow:hidden;text-decoration:none;color:inherit;margin-bottom:8px;transition:border-color .2s,box-shadow .2s}
.featured-post:hover{border-color:rgba(224,32,45,.4);box-shadow:0 18px 44px rgba(0,0,0,.5)}
.featured-post .post-cover{height:100%;min-height:300px;border-bottom:none;border-right:1px solid var(--line)}
.featured-post .post-body{padding:38px}
.featured-post .fz{font-family:var(--bmono);font-size:11px;color:var(--red);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.featured-post h2{font-family:var(--bhead);font-size:28px;font-weight:800;line-height:1.2;margin:0 0 12px}
@media(max-width:720px){.featured-post{grid-template-columns:1fr}.featured-post .post-cover{min-height:200px;border-right:none;border-bottom:1px solid var(--line)}}
.blog-empty{text-align:center;padding:60px;color:var(--muted);grid-column:1/-1}
</style>
<!-- Google Analytics (GA4) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TK1ELX5K0L"></script>

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

</head>
<body>
<div id="announce-bar" style="display:none;background:var(--red);color:white;text-align:center;padding:8px;font-size:13px;cursor:pointer"></div>
<div id="nav-mount"></div>

<header class="blog-hero">
  <div class="blog-hero-inner">
    <div class="eyebrow">EKRPT Knowledge Base</div>
    <h1>The EKRPT <em>Blog</em></h1>
    <p>Guides, product news and practical tips on Starlink, WiFi 7, routers and staying connected across Nigeria.</p>
  </div>
</header>

<div class="blog-wrap">
  <div class="blog-cats" id="cats"></div>
  <div id="featured-wrap"></div>
  <div class="posts-grid" id="posts"><div class="blog-empty">Loading posts…</div></div>
</div>

<div id="footer-mount"></div>

<script src="../js/config.js"></script>
<script src="../js/main.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/store.js"></script>
<script src="../js/site-settings.js"></script>
<script>
let _all=[],_activeCat='All';
document.addEventListener('DOMContentLoaded',async()=>{
  const s=await SiteSettings.boot({title:'Blog — EKRPT Networking Labs',description:'Guides, news and tips on Starlink and networking in Nigeria.',type:'website'});
  buildBlogChrome(s);
  await loadPosts();
});
async function loadPosts(){
  try{
    _all=await Blog.list({limit:60});
    renderCats();renderPosts();
  }catch(e){document.getElementById('posts').innerHTML='<div class="blog-empty">Could not load posts. Make sure the blog schema is set up.</div>';}
}
function renderCats(){
  const cats=['All',...new Set(_all.map(p=>p.category).filter(Boolean))];
  document.getElementById('cats').innerHTML=cats.map(c=>`<button class="cat-pill ${c===_activeCat?'active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
}
function setCat(c){_activeCat=c;renderCats();renderPosts();}
function renderPosts(){
  const list=_activeCat==='All'?_all:_all.filter(p=>p.category===_activeCat);
  // Featured
  const feat=list.find(p=>p.featured);
  document.getElementById('featured-wrap').innerHTML=(feat&&_activeCat==='All')?featuredCard(feat):'';
  const rest=list.filter(p=>!(feat&&_activeCat==='All'&&p.id===feat.id));
  document.getElementById('posts').innerHTML=rest.map(card).join('')||'<div class="blog-empty">No posts in this category yet.</div>';
}
function card(p){
  return `<a class="post-card" href="./post.html?slug=${encodeURIComponent(p.slug)}">
    <div class="post-cover" style="${p.cover_image?`background-image:url('${p.cover_image}')`:''}"><span class="cat">${p.category||'General'}</span></div>
    <div class="post-body"><h2>${p.title}</h2><p>${p.excerpt||''}</p>
      <div class="post-meta"><span>📅 ${fmtDate(p.published_at)}</span><span>⏱️ ${p.reading_time||1} min</span><span>👁️ ${p.views||0}</span></div>
    </div></a>`;
}
function featuredCard(p){
  return `<a class="featured-post" href="./post.html?slug=${encodeURIComponent(p.slug)}">
    <div class="post-cover" style="${p.cover_image?`background-image:url('${p.cover_image}')`:''}"><span class="cat">⭐ Featured</span></div>
    <div class="post-body"><div style="font-family:var(--font-mono);font-size:11px;color:var(--blue);font-weight:700;margin-bottom:8px">${p.category||'General'}</div><h2>${p.title}</h2><p>${p.excerpt||''}</p>
      <div class="post-meta"><span>📅 ${fmtDate(p.published_at)}</span><span>⏱️ ${p.reading_time||1} min read</span></div>
    </div></a>`;
}
function fmtDate(d){return d?new Date(d).toLocaleDateString('en-NG',{year:'numeric',month:'short',day:'numeric'}):'';}
</script>
</body>
</html>
