<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Loading… — EKRPT Blog</title>
<link rel="stylesheet" href="../css/style.css"/>
<link rel="stylesheet" href="../css/theme-spectre-dark.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#07080b; --panel:#0d0f14; --panel-2:#11141b; --line:rgba(255,255,255,.08);
  --ink:#f4f6fb; --muted:#8b93a3; --soft:#c4ccd8; --red:#e0202d; --red-deep:#b3151f; --red-glow:rgba(224,32,45,.4);
  --bhead:'Sora',sans-serif; --bbody:'Inter',sans-serif; --bmono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--ink);font-family:var(--bbody)}
.back-blog{max-width:760px;margin:28px auto 0;padding:0 24px}
.back-blog a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:600;font-family:var(--bmono)}
.back-blog a:hover{color:var(--red)}
.article-hero{max-width:820px;margin:0 auto;padding:32px 24px 0;text-align:center}
.article-cat{font-family:var(--bmono);font-size:12px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.12em}
.article-hero h1{font-family:var(--bhead);font-size:clamp(30px,5vw,46px);font-weight:800;line-height:1.12;letter-spacing:-.02em;margin:14px 0 18px;color:var(--ink)}
.article-meta{display:flex;gap:18px;justify-content:center;color:var(--muted);font-size:12px;font-family:var(--bmono);margin-bottom:28px;flex-wrap:wrap;opacity:.85}
.article-cover{max-width:980px;margin:0 auto 40px;padding:0 24px}
.article-cover img{width:100%;max-height:460px;object-fit:cover;border-radius:18px;border:1px solid var(--line)}
.article-body{max-width:720px;margin:0 auto;padding:0 24px 56px;font-size:18px;line-height:1.85;color:var(--soft)}
.article-body h2{font-family:var(--bhead);font-size:27px;font-weight:700;margin:40px 0 14px;color:var(--ink);letter-spacing:-.01em}
.article-body h3{font-family:var(--bhead);font-size:21px;font-weight:700;margin:30px 0 10px;color:var(--ink)}
.article-body p{margin-bottom:22px}
.article-body strong{color:var(--ink)}
.article-body em{color:var(--soft)}
.article-body img{max-width:100%;border-radius:12px;margin:28px 0;border:1px solid var(--line)}
.article-body a{color:var(--red);text-decoration:none;border-bottom:1px solid rgba(224,32,45,.4)}
.article-body a:hover{border-bottom-color:var(--red)}
.article-body ul,.article-body ol{margin:0 0 22px 22px}
.article-body li{margin-bottom:10px}
.article-body blockquote{border-left:3px solid var(--red);padding:10px 22px;margin:28px 0;color:var(--muted);font-style:italic;background:var(--panel);border-radius:0 10px 10px 0}
.article-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:36px;padding-top:26px;border-top:1px solid var(--line)}
.tag{background:var(--panel);color:var(--muted);padding:6px 15px;border-radius:100px;font-size:12px;font-family:var(--bmono);border:1px solid var(--line)}
.share-row{display:flex;gap:10px;align-items:center;margin-top:26px}
.share-btn{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--panel);border:1px solid var(--line);text-decoration:none;font-size:17px;transition:all .18s}
.share-btn:hover{background:var(--red);border-color:var(--red);transform:translateY(-2px)}
.related{max-width:1140px;margin:0 auto;padding:8px 24px 64px}
.related h3{font-family:var(--bhead);font-size:22px;margin-bottom:20px;color:var(--ink)}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px}
.rel-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .2s,border-color .2s}
.rel-card:hover{transform:translateY(-4px);border-color:rgba(224,32,45,.4)}
</style>
<!-- Google Analytics (GA4) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TK1ELX5K0L"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-TK1ELX5K0L');
</script>
</head>
<body>
<div id="announce-bar" style="display:none;background:var(--red);color:white;text-align:center;padding:8px;font-size:13px;cursor:pointer"></div>
<div id="nav-mount"></div>

<div class="back-blog"><a href="./index.html">← All articles</a></div>
<article id="article"><div style="text-align:center;padding:80px;color:var(--gray-300)">Loading…</div></article>
<div class="related" id="related"></div>

<div id="footer-mount"></div>

<script src="../js/config.js"></script>
<script src="../js/main.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/store.js"></script>
<script src="../js/site-settings.js"></script>
<script>
document.addEventListener('DOMContentLoaded',async()=>{
  await SiteSettings.get(true);
  const s=await SiteSettings.get();
  SiteSettings.applyTheme(s);
  const slug=new URLSearchParams(location.search).get('slug');
  if(!slug){document.getElementById('article').innerHTML=err('No article specified');return;}
  await loadPost(slug);
});
async function loadPost(slug){
  let p;
  try{p=await Blog.getBySlug(slug);}catch(e){}
  if(!p){document.getElementById('article').innerHTML=err('Article not found');document.title='Not found — EKRPT Blog';return;}

  // ── SEO ──
  const seoTitle=(p.seo_title||p.title)+' — EKRPT Blog';
  const seoDesc=p.seo_description||p.excerpt||'';
  const img=p.og_image||p.cover_image||'';
  const url=location.href;
  SiteSettings.applySEO({title:seoTitle,description:seoDesc,keywords:p.seo_keywords,image:img,url,type:'article',canonical:p.canonical_url||url,noIndex:p.no_index});
  // Article structured data (JSON-LD) — helps Google show rich results
  SiteSettings.injectJsonLd({
    '@context':'https://schema.org','@type':'BlogPosting',
    headline:p.title,description:seoDesc,image:img?[img]:[],
    author:{'@type':'Organization',name:p.author_name||'EKRPT Networking Labs'},
    publisher:{'@type':'Organization',name:'EKRPT Networking Labs'},
    datePublished:p.published_at,dateModified:p.updated_at,
    mainEntityOfPage:{'@type':'WebPage','@id':url},
    articleSection:p.category,keywords:(p.tags||[]).join(', '),
  });
  // Breadcrumb structured data
  SiteSettings.injectJsonLd({
    '@context':'https://schema.org','@type':'BreadcrumbList',
    itemListElement:[
      {'@type':'ListItem',position:1,name:'Home',item:'https://ekrpt.com'},
      {'@type':'ListItem',position:2,name:'Blog',item:'https://ekrpt.com/blog/'},
      {'@type':'ListItem',position:3,name:p.title,item:url},
    ],
  });

  // ── Render ──
  document.getElementById('article').innerHTML=`
    <div class="article-hero">
      <div class="article-cat">${p.category||'General'}</div>
      <h1>${p.title}</h1>
      <div class="article-meta"><span>✍️ ${p.author_name||'EKRPT Team'}</span><span>📅 ${fmtDate(p.published_at)}</span><span>⏱️ ${p.reading_time||1} min read</span><span>👁️ ${p.views||0} views</span></div>
    </div>
    ${p.cover_image?`<div class="article-cover"><img src="${p.cover_image.startsWith('http')||p.cover_image.startsWith('/')?p.cover_image:'/'+p.cover_image}" alt="${p.cover_alt||p.title}"/></div>`:''}
    <div class="article-body">${p.content||''}
      ${(p.tags&&p.tags.length)?`<div class="article-tags">${p.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>`:''}
      <div class="share-row"><span style="font-size:13px;color:#8b93a3;font-family:var(--font-mono)">Share:</span>
        <a class="share-btn" href="https://wa.me/?text=${encodeURIComponent(p.title+' '+url)}" target="_blank">💬</a>
        <a class="share-btn" href="https://twitter.com/intent/tweet?text=${encodeURIComponent(p.title)}&url=${encodeURIComponent(url)}" target="_blank">𝕏</a>
        <a class="share-btn" href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}" target="_blank">f</a>
        <a class="share-btn" href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(url)}" target="_blank">in</a>
      </div>
    </div>`;

  loadRelated(p);
}
async function loadRelated(p){
  try{
    const all=await Blog.list({category:p.category,limit:4});
    const rel=all.filter(x=>x.slug!==p.slug).slice(0,3);
    if(!rel.length)return;
    document.getElementById('related').innerHTML=`<h3>More from ${p.category||'the blog'}</h3><div class="related-grid">${rel.map(r=>`<a class="post-card" href="./post.html?slug=${encodeURIComponent(r.slug)}" style="background:#0d0f14;border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;text-decoration:none;color:inherit"><div style="height:150px;background:#11141b center/cover;${r.cover_image?`background-image:url('${r.cover_image.startsWith('http')||r.cover_image.startsWith('/')?r.cover_image:'/'+r.cover_image}')`:''}"></div><div style="padding:16px"><h2 style="font-family:var(--font-head);font-size:16px;font-weight:700;margin-bottom:6px">${r.title}</h2><p style="font-size:13px;color:#8b93a3">${(r.excerpt||'').slice(0,90)}…</p></div></a>`).join('')}</div>`;
  }catch(e){}
}
function fmtDate(d){return d?new Date(d).toLocaleDateString('en-NG',{year:'numeric',month:'long',day:'numeric'}):'';}
function err(msg){return `<div style="text-align:center;padding:80px 24px"><div style="font-size:48px;margin-bottom:12px">📭</div><h1 style="font-family:var(--font-head);font-size:24px;margin-bottom:8px">${msg}</h1><a href="./index.html" style="color:var(--blue)">← Back to blog</a></div>`;}
</script>
</body>
</html>
