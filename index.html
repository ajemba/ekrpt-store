<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="Sign in or create an EKRPT Networking Labs account."/>
<title>Sign In — EKRPT Networking Labs</title>
<link rel="stylesheet" href="css/style.css"/>
<link rel="stylesheet" href="css/theme-spectre-hybrid.css"/>
<style>
.auth-page{min-height:100vh;background:var(--off-white);display:flex;flex-direction:column}
.auth-main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.auth-card{background:white;border:1px solid var(--gray-100);border-radius:var(--radius-xl);padding:36px;width:100%;max-width:420px;box-shadow:var(--shadow-md)}
.auth-brand{text-align:center;margin-bottom:28px}
.auth-logo{width:48px;height:48px;background:var(--blue);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.auth-logo svg{width:26px;height:26px;fill:white}
.auth-title{font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--gray-900)}
.auth-sub{font-size:14px;color:var(--gray-400);margin-top:4px;font-weight:300}
.auth-tabs{display:flex;background:var(--gray-50);border-radius:var(--radius);padding:3px;margin-bottom:26px}
.auth-tab{flex:1;padding:9px;border:none;background:none;border-radius:8px;font-size:13px;cursor:pointer;color:var(--gray-400);transition:all .15s;font-family:var(--font-body);font-weight:500}
.auth-tab.active{background:white;color:var(--gray-900);box-shadow:var(--shadow-sm);border:0.5px solid var(--gray-100)}
.social-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.soc-btn{border:1.5px solid var(--gray-100);background:white;border-radius:var(--radius);padding:12px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .15s;font-family:var(--font-body)}
.soc-btn:hover{border-color:var(--gray-200);background:var(--gray-50);transform:translateY(-1px)}
.soc-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.soc-g{background:#fef2f2}
.soc-fb{background:#eff6ff}
.soc-tt{background:#1a1a1a}
.soc-label{font-size:12px;color:var(--gray-500);font-weight:500}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0}
.divider-line{flex:1;height:1px;background:var(--gray-100)}
.divider-text{font-size:12px;color:var(--gray-300);white-space:nowrap;font-family:var(--font-mono)}
.name-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:42px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;padding:2px;color:var(--gray-300)}
.forgot-row{display:flex;justify-content:flex-end;margin-bottom:14px}
.forgot-link{font-size:12px;color:var(--blue);text-decoration:none;background:none;border:none;cursor:pointer;font-family:var(--font-body)}
.submit-btn{width:100%;padding:12px;background:var(--blue);color:white;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-head);transition:all .18s;letter-spacing:.01em}
.submit-btn:hover{background:var(--blue-dark)}
.terms{font-size:11px;color:var(--gray-300);text-align:center;margin-top:14px;line-height:1.6;font-family:var(--font-mono)}
.terms a{color:var(--blue);text-decoration:none}
.switch-text{text-align:center;font-size:13px;color:var(--gray-400);margin-top:18px}
.switch-text a{color:var(--blue);cursor:pointer;text-decoration:none;font-weight:500}

/* success state */
.success-view{text-align:center;padding:16px 0;display:none}
.success-view.show{display:block}
.success-ring{width:60px;height:60px;border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:26px}
.success-view h3{font-family:var(--font-head);font-size:20px;font-weight:700;color:var(--gray-900);margin-bottom:6px}
.success-view p{font-size:14px;color:var(--gray-400);margin-bottom:20px;font-weight:300}
.linked-pill{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--gray-100);border-radius:var(--radius);margin-bottom:8px;font-size:13px;color:var(--gray-700);background:var(--gray-50)}
.linked-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.linked-status{margin-left:auto;font-size:11px;font-family:var(--font-mono);background:var(--blue-light);color:var(--blue-dark);padding:2px 8px;border-radius:100px;font-weight:700}
</style>
</head>
<body>
<div id="nav-mount"></div>

<div class="auth-page">
  <div class="auth-main">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-logo"><svg viewBox="0 0 20 20"><path d="M2 4h16v2H2zM2 9h10v2H2zM2 14h13v2H2z"/></svg></div>
        <div class="auth-title">EKRPT <span style="color:var(--blue)">Labs</span></div>
        <div class="auth-sub" id="auth-sub">Welcome back</div>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-in" onclick="switchMode('in')">Sign in</button>
        <button class="auth-tab" id="tab-up" onclick="switchMode('up')">Create account</button>
      </div>

      <!-- FORM VIEW -->
      <div id="form-view">
        <div class="social-grid">
          <button class="soc-btn" onclick="socialLogin('Google')">
            <div class="soc-icon soc-g">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908C16.658 14.253 17.64 11.945 17.64 9.2z" fill="#c23535"/>
                <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#3B6D11"/>
                <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#633806"/>
                <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#185FA5"/>
              </svg>
            </div>
            <span class="soc-label">Google</span>
          </button>
          <button class="soc-btn" onclick="socialLogin('Facebook')">
            <div class="soc-icon soc-fb">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877f2">
                <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.532-4.697 1.312 0 2.686.235 2.686.235v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.269h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
              </svg>
            </div>
            <span class="soc-label">Facebook</span>
          </button>
          <button class="soc-btn" onclick="socialLogin('TikTok')">
            <div class="soc-icon soc-tt">
              <svg width="18" height="18" viewBox="0 0 24 24">
                <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.75a8.27 8.27 0 004.84 1.55V6.86a4.85 4.85 0 01-1.07-.17z" fill="#fff"/>
              </svg>
            </div>
            <span class="soc-label">TikTok</span>
          </button>
        </div>

        <div class="divider">
          <div class="divider-line"></div>
          <div class="divider-text">or continue with email</div>
          <div class="divider-line"></div>
        </div>

        <div id="name-fields" class="name-row" style="display:none">
          <div class="field"><label>First name</label><input type="text" id="first-name" placeholder="Chidi"/></div>
          <div class="field"><label>Last name</label><input type="text" id="last-name" placeholder="Okafor"/></div>
        </div>

        <div class="field"><label>Email address</label><input type="email" id="email-input" placeholder="you@example.com"/></div>

        <div class="field">
          <label>Password</label>
          <div class="pw-wrap">
            <input type="password" id="pw-input" placeholder="••••••••"/>
            <button class="pw-toggle" onclick="togglePw()" aria-label="Toggle password">👁</button>
          </div>
        </div>

        <div id="confirm-field" class="field" style="display:none">
          <label>Confirm password</label>
          <div class="pw-wrap"><input type="password" placeholder="••••••••"/></div>
        </div>

        <div id="forgot-row" class="forgot-row"><a class="forgot-link" onclick="forgotPw()">Forgot password?</a></div>

        <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">Sign in to EKRPT</button>

        <div id="terms-row" class="terms" style="display:none">
          By creating an account you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
        </div>

        <div class="switch-text" id="switch-text">
          Don't have an account? <a onclick="switchMode('up')">Create one free</a>
        </div>
      </div>

      <!-- SUCCESS VIEW -->
      <div class="success-view" id="success-view">
        <div class="success-ring">✓</div>
        <h3 id="suc-title">Signed in!</h3>
        <p id="suc-sub">Redirecting to your account…</p>
        <div id="suc-linked"></div>
        <button class="btn btn-secondary btn-sm" style="margin-top:16px" onclick="resetAuth()">Back to login</button>
      </div>

    </div>
  </div>
</div>

<div id="footer-mount"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/main.js"></script>
<script src="js/auth.js"></script>
<script src="js/store.js"></script>
<script src="js/roles.js"></script>
<script src="js/site-settings.js"></script>
<script>
let mode = 'in';
let pwVis = false;

// Apply saved theme/branding to the login page too
document.addEventListener('DOMContentLoaded', async () => {
  try { SiteSettings.applyTheme(await SiteSettings.get()); } catch (e) {}
  // If already signed in, route to the right place
  try {
    const u = await Auth.getUser();
    if (u && u.profile) routeByRole(u.profile.role);
  } catch (e) {}
});

// Where each role lands after login
function routeByRole(role) {
  const home = (typeof ROLES !== 'undefined' && ROLES[role]) ? ROLES[role].home : '/account/index.html';
  location.href = '.' + home; // ROLES home values start with '/', resolve from site root
}

// Check URL for #signup
if (location.hash === '#signup') switchMode('up');

function switchMode(m) {
  mode = m;
  document.getElementById('tab-in').classList.toggle('active', m === 'in');
  document.getElementById('tab-up').classList.toggle('active', m === 'up');
  document.getElementById('auth-sub').textContent = m === 'in' ? 'Welcome back' : 'Join EKRPT Networking Labs';
  document.getElementById('name-fields').style.display = m === 'up' ? 'grid' : 'none';
  document.getElementById('confirm-field').style.display = m === 'up' ? 'block' : 'none';
  document.getElementById('forgot-row').style.display = m === 'in' ? 'flex' : 'none';
  document.getElementById('terms-row').style.display = m === 'up' ? 'block' : 'none';
  document.getElementById('submit-btn').textContent = m === 'in' ? 'Sign in to EKRPT' : 'Create my account';
  document.getElementById('switch-text').innerHTML = m === 'in'
    ? "Don't have an account? <a onclick=\"switchMode('up')\">Create one free</a>"
    : "Already have an account? <a onclick=\"switchMode('in')\">Sign in</a>";
  document.getElementById('success-view').classList.remove('show');
  document.getElementById('form-view').style.display = 'block';
}

function togglePw() {
  pwVis = !pwVis;
  document.getElementById('pw-input').type = pwVis ? 'text' : 'password';
}

function forgotPw() {
  const email = document.getElementById('email-input').value;
  if (!email) { showToast('Enter your email first', 'error'); return; }
  Auth.sendPasswordReset(email).then(() => showToast('Password reset email sent to ' + email))
    .catch(e => showToast('Error: ' + e.message, 'error'));
}

async function handleSubmit() {
  const email = document.getElementById('email-input').value;
  const pw = document.getElementById('pw-input').value;
  if (!email || !email.includes('@')) { showToast('Please enter a valid email', 'error'); return; }
  if (!pw || pw.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
  const btn = document.getElementById('submit-btn');
  btn.textContent = mode === 'in' ? 'Signing in…' : 'Creating account…';
  btn.disabled = true;
  try {
    if (mode === 'up') {
      const fn = document.getElementById('first-name')?.value || '';
      const ln = document.getElementById('last-name')?.value || '';
      await Auth.signUp({ email, password: pw, fullName: (fn + ' ' + ln).trim() });
      showSuccess('Account created!', 'Welcome to EKRPT Networking Labs', null);
      setTimeout(() => routeByRole('customer'), 1200);
    } else {
      await Auth.signIn({ email, password: pw });
      // 2FA check — if this account has TOTP enrolled, require the code
      const factors = await Auth.listMfaFactors?.();
      if (factors && factors.length) {
        const needs = await Auth.needsMfa?.();
        if (needs) { promptMfa(factors[0].id); btn.disabled = false; btn.textContent = 'Sign in to EKRPT'; return; }
      }
      const u = await Auth.getUser();
      showSuccess('Signed in!', 'Welcome back to EKRPT', null);
      setTimeout(() => routeByRole(u?.profile?.role || 'customer'), 900);
    }
  } catch (e) {
    showToast(e.message || 'Authentication failed', 'error');
    btn.disabled = false;
    btn.textContent = mode === 'in' ? 'Sign in to EKRPT' : 'Create my account';
  }
}

// 2FA prompt (super admin / any account with TOTP)
function promptMfa(factorId) {
  document.getElementById('form-view').style.display = 'none';
  const sv = document.getElementById('success-view');
  sv.classList.add('show');
  document.getElementById('suc-title').textContent = 'Two-factor authentication';
  document.getElementById('suc-sub').textContent = 'Enter the 6-digit code from your authenticator app';
  document.getElementById('suc-linked').innerHTML = `
    <input id="mfa-code" maxlength="6" placeholder="000000" style="font-family:var(--font-mono);font-size:24px;letter-spacing:8px;text-align:center;padding:12px;width:180px;border:1.5px solid var(--gray-100);border-radius:10px;margin:10px 0"/>
    <button class="btn btn-primary" style="display:block;margin:8px auto 0" onclick="verifyMfa('${factorId}')">Verify & continue</button>`;
  setTimeout(() => document.getElementById('mfa-code')?.focus(), 100);
}
async function verifyMfa(factorId) {
  try {
    await Auth.verifyMfa(factorId, document.getElementById('mfa-code').value);
    const u = await Auth.getUser();
    showSuccess('Verified!', 'Welcome back', null);
    setTimeout(() => routeByRole(u?.profile?.role || 'customer'), 700);
  } catch (e) { showToast('Invalid code, try again', 'error'); }
}

async function socialLogin(provider) {
  try {
    if (provider === 'Google') await Auth.signInWithGoogle();
    else if (provider === 'Facebook') await Auth.signInWithFacebook();
    else if (provider === 'TikTok') await Auth.signInWithTikTok();
  } catch (e) { showToast(provider + ' login not configured yet', 'error'); }
}

function showSuccess(title, sub, provider, color) {
  document.getElementById('form-view').style.display = 'none';
  document.getElementById('success-view').classList.add('show');
  document.getElementById('suc-title').textContent = title;
  document.getElementById('suc-sub').textContent = sub;
  const linked = document.getElementById('suc-linked');
  linked.innerHTML = provider ? `
    <div class="linked-pill">
      <div class="linked-dot" style="background:${color}"></div>
      <span>${provider} account</span>
      <span class="linked-status">CONNECTED</span>
    </div>` : '';
}

function resetAuth() {
  document.getElementById('success-view').classList.remove('show');
  document.getElementById('form-view').style.display = 'block';
}
</script>
</body>
</html>
